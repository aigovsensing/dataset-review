name: 오픈 데이터셋 법적 리스크 검토

on:
  issues:
    types: [opened, labeled]

# 같은 이슈의 실행을 직렬화하되, 진행 중인 실행은 절대 취소하지 않는다.
#  ⚠️ cancel-in-progress: true 였을 때, 템플릿 이슈 생성 시 거의 동시에 오는
#     opened / labeled 이벤트 중 나중의 labeled run 이 concurrency 그룹에 들어오며
#     검토를 수행하던 opened run 을 취소했고, 정작 labeled run 은 아래 if 조건
#     (rerun-review 만 허용)에 걸려 skip 되어 → 어떤 검토도 실행되지 않고 이슈가
#     영구 "대기" 상태로 남는 버그가 있었다. labeled(dataset-review) 는 항상 skip
#     되어 이중 호출 위험이 없으므로 취소가 불필요하다. false 로 두어 opened run 이
#     끝까지 검토를 마치도록 한다.
concurrency:
  group: dataset-review-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  issues: write
  contents: read

jobs:
  review:
    # 검토 실행 조건 (Gemini 무료 쿼터 보호를 위해 호출 횟수를 최소화):
    #  1) 이슈 작성자가 저장소 OWNER/MEMBER/COLLABORATOR 여야 한다.
    #     → 외부인의 무분별한 이슈 생성으로 인한 Gemini API 쿼터 소진을 방지.
    #  2) 'dataset-review' 라벨이 있는 이슈만 검토.
    #  3) 이벤트별로 정확히 한 번만 실행:
    #     - opened: 신규 이슈이고 아직 'reviewed' 가 아닐 때 1회 실행.
    #     - labeled: 'rerun-review' 라벨이 새로 붙었을 때만 실행(수동 재검토).
    #       ⚠️ 과거에는 labeled 이벤트 전체를 허용했는데, 워크플로 자신이 붙이는
    #       'reviewing' 라벨이 두 번째 실행을 유발해 같은 이슈에 Gemini 가
    #       이중 호출(첫 실행은 cancel-in-progress 로 중도 취소)되는 낭비가 있었다.
    if: >
      ( github.event.issue.author_association == 'OWNER' ||
        github.event.issue.author_association == 'MEMBER' ||
        github.event.issue.author_association == 'COLLABORATOR' ) &&
      contains(github.event.issue.labels.*.name, 'dataset-review') &&
      ( ( github.event.action == 'opened' &&
          !contains(github.event.issue.labels.*.name, 'reviewed') ) ||
        ( github.event.action == 'labeled' &&
          github.event.label.name == 'rerun-review' ) )
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v5

      - name: Python 설정
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install -r scripts/requirements.txt

      - name: 검토 시작 알림
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --add-label "reviewing" --repo "$GITHUB_REPOSITORY" || true
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --body "🤖 자동 법적 리스크 검토를 시작합니다. 잠시만 기다려 주세요 (보통 1~3분 소요)."

      - name: 법적 리스크 검토 실행
        id: run_review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 저장소 변수 vars.GEMINI_MODEL 이 없으면 빈 문자열이 되어 스크립트가 실패하므로
          # 워크플로 레벨에서도 기본 모델로 대체한다(스크립트 내 방어와 이중 안전장치).
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REVIEW_OUTPUT: review.md
        run: python scripts/review.py
        continue-on-error: true

      - name: 검토 결과 이슈 댓글 등록
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file review.md

      - name: 라벨 정리
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REVIEW_OUTCOME: ${{ steps.run_review.outcome }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --remove-label "reviewing" || true
          gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --remove-label "rerun-review" || true
          if [ "$REVIEW_OUTCOME" = "success" ]; then
            gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --add-label "reviewed" || true
          else
            gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --add-label "review-failed" || true
          fi

      - name: 검토 실패 시 run 을 실패로 표시
        # 위 단계에서 실패 사유는 이미 이슈 댓글과 review-failed 라벨로 남긴다.
        # 여기서 잡을 실패시켜, 검토가 실패했는데도 run 이 초록색(success)으로
        # 보이는 오해를 방지한다.
        if: steps.run_review.outcome != 'success'
        run: |
          echo "::error::법적 리스크 검토 실행이 실패했습니다. 이슈 댓글의 오류 메시지를 확인하세요."
          exit 1
